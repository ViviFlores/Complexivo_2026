<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <title>RelsB</title>
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center">Agregar Producto</h1>
    <form action="" method="post">
      <div class="mb-3">
        <label class="form-label" form="name">Nombre</label>
        <input class="form-control" id="name" type="text" name="name" required>
      </div>
      <div class="mb-3">
        <label class="form-label" form="price">Precio</label>
        <input class="form-control" id="price" type="number" name="price" required>
      </div>
      <div class="mb-3">
        <label class="form-label" form="stock">Stock</label>
        <input class="form-control" id="stock" type="number" name="stock" required>
      </div>
      <div class="mb-3">
        <label class="form-label" form="description">Descripción</label>
        <textarea class="form-control" id="description" type="text" name="description" rows="3" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label" form="category">Categoría</label>
        <select class="form-control" id="category" name="category.id" required>
          <option value="" disabled selected>Seleccionar Categoría</option>
          <th:block th:each="category : ${categories}">
            <option th:value="${category.id}" th:text="${category.name}"></option>
          </th:block>
        </select>
      </div>
    </form>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</html>
